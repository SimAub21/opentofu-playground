#cloud-config
users:
  - name: ${username}
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_key}

# Optional: Pakete direkt beim Booten installieren
packages:
  - qemu-guest-agent
  - htop
  - curl

runcmd:
  - [ systemctl, enable, --now, qemu-guest-agent ]
